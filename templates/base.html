<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Diyetisyen Yönetim Sistemi{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f5f1e8;
            --bg-soft: #e8efe9;
            --surface: #fffdf8;
            --surface-muted: #f8f5ee;
            --line: #d7ded5;
            --ink: #20323f;
            --ink-muted: #60707d;
            --primary: #1d7a63;
            --primary-strong: #145646;
            --accent: #cc6a3f;
            --accent-soft: #ffe8dd;
            --warning: #e2a21f;
            --danger: #b6423c;
            --ok: #2f7f61;
            --shadow-soft: 0 20px 50px rgba(32, 50, 63, 0.08);
            --shadow-card: 0 12px 30px rgba(32, 50, 63, 0.07);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', 'Trebuchet MS', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 14% 14%, rgba(29, 122, 99, 0.15) 0, transparent 42%),
                radial-gradient(circle at 86% 4%, rgba(204, 106, 63, 0.14) 0, transparent 36%),
                linear-gradient(160deg, var(--bg-main) 0%, #f7f5ef 42%, var(--bg-soft) 100%);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .display-font,
        .brand-text {
            font-family: 'Sora', 'Verdana', sans-serif;
            letter-spacing: -0.02em;
        }

        .site-shell {
            position: relative;
            isolation: isolate;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 1030;
            background: rgba(255, 253, 248, 0.94);
            border-bottom: 1px solid rgba(32, 50, 63, 0.08);
            backdrop-filter: blur(10px);
        }

        .brand-wrap {
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            text-decoration: none;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
            color: #fff;
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .brand-text {
            color: var(--ink);
            font-size: 1.06rem;
            font-weight: 700;
        }

        .navbar .nav-link {
            border-radius: 999px;
            color: var(--ink-muted);
            font-weight: 600;
            padding: 0.42rem 0.9rem;
            transition: all 0.18s ease;
        }

        .navbar .nav-link:hover,
        .navbar .nav-link.active {
            color: var(--primary-strong);
            background: rgba(29, 122, 99, 0.12);
        }

        .role-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border-radius: 999px;
            padding: 0.36rem 0.72rem;
            border: 1px solid rgba(32, 50, 63, 0.1);
            color: var(--ink-muted);
            background: rgba(255, 255, 255, 0.72);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .main-content {
            padding: 2rem 0 2.7rem;
        }

        .surface-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, #ffffff 0%, var(--surface) 100%);
            box-shadow: var(--shadow-card);
        }

        .surface-muted {
            border: 1px solid rgba(96, 112, 125, 0.16);
            border-radius: var(--radius-md);
            background: var(--surface-muted);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            border-radius: 999px;
            background: rgba(29, 122, 99, 0.14);
            color: var(--primary-strong);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 0.34rem 0.72rem;
        }

        .muted {
            color: var(--ink-muted) !important;
        }

        .btn {
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.01em;
            padding: 0.6rem 1rem;
        }

        .btn-primary,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background-color: var(--primary-strong);
            border-color: var(--primary-strong);
        }

        .btn-outline-primary {
            border-color: var(--primary);
            color: var(--primary-strong);
            background: transparent;
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus {
            border-color: var(--primary);
            background-color: rgba(29, 122, 99, 0.1);
            color: var(--primary-strong);
        }

        .btn-secondary,
        .btn-secondary:focus,
        .btn-secondary:active {
            background-color: #70828f;
            border-color: #70828f;
            color: #fff;
        }

        .btn-secondary:hover {
            background-color: #586774;
            border-color: #586774;
            color: #fff;
        }

        .btn-danger,
        .btn-outline-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger,
        .btn-danger:hover {
            color: #fff;
            background: var(--danger);
        }

        .metric-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: #fff;
            padding: 1rem;
            box-shadow: var(--shadow-card);
            height: 100%;
        }

        .metric-label {
            font-size: 0.8rem;
            color: var(--ink-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .metric-value {
            font-family: 'Sora', sans-serif;
            font-size: 1.42rem;
            line-height: 1.1;
            margin-bottom: 0.2rem;
            color: var(--ink);
        }

        .metric-help {
            margin: 0;
            font-size: 0.82rem;
            color: var(--ink-muted);
        }

        .icon-pill {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(29, 122, 99, 0.14);
            color: var(--primary-strong);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .data-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .data-list li {
            display: flex;
            justify-content: space-between;
            gap: 0.9rem;
            padding: 0.58rem 0;
            border-bottom: 1px solid rgba(96, 112, 125, 0.16);
            font-size: 0.92rem;
        }

        .data-list li:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .data-list span:first-child {
            color: var(--ink-muted);
        }

        .action-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.78rem;
            border-radius: 14px;
            text-decoration: none;
            border: 1px solid transparent;
            color: var(--ink);
            transition: all 0.18s ease;
        }

        .action-link:hover {
            border-color: var(--line);
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }

        .status-pill,
        .badge-scheduled,
        .badge-confirmed,
        .badge-completed,
        .badge-cancelled {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 0.22rem 0.58rem;
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .status-scheduled,
        .badge-scheduled,
        .badge-scheduled.badge {
            background: #e8f1ff;
            color: #264d8f;
            border-color: #bfd2f2;
        }

        .status-confirmed,
        .badge-confirmed,
        .badge-confirmed.badge {
            background: #e5f6ee;
            color: #1f6a4d;
            border-color: #b8decf;
        }

        .status-completed,
        .badge-completed,
        .badge-completed.badge {
            background: #edf0f2;
            color: #455560;
            border-color: #cfd7dc;
        }

        .status-cancelled,
        .badge-cancelled,
        .badge-cancelled.badge {
            background: #ffecea;
            color: #95423f;
            border-color: #f4c4bf;
        }

        .appointment-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 0.92rem;
            background: #fff;
        }

        .appointment-card + .appointment-card {
            margin-top: 0.78rem;
        }

        .auth-shell {
            min-height: calc(100vh - 20px);
            display: flex;
            align-items: center;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 1rem;
            padding: 1rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.74);
            backdrop-filter: blur(8px);
            box-shadow: var(--shadow-soft);
        }

        .auth-side {
            border-radius: var(--radius-lg);
            background:
                linear-gradient(180deg, rgba(29, 122, 99, 0.2), rgba(20, 86, 70, 0.75)),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.35), transparent 38%);
            color: #fff;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 420px;
        }

        .auth-bullet {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            margin-bottom: 0.65rem;
            font-size: 0.93rem;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid rgba(96, 112, 125, 0.34);
            padding: 0.62rem 0.8rem;
            background: #fff;
            font-weight: 500;
            color: var(--ink);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.18rem rgba(29, 122, 99, 0.17);
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.73rem;
            color: var(--ink-muted);
            border-bottom-width: 1px;
            border-color: rgba(96, 112, 125, 0.3);
            font-weight: 800;
        }

        .table tbody td {
            font-size: 0.92rem;
            border-color: rgba(96, 112, 125, 0.18);
            vertical-align: middle;
        }

        .alert {
            border: 0;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(32, 50, 63, 0.08);
            font-weight: 600;
        }

        .section-title {
            margin-bottom: 1rem;
        }

        .section-title h1,
        .section-title h2,
        .section-title h3 {
            margin-bottom: 0.3rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            border: 1px dashed rgba(96, 112, 125, 0.38);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.7);
        }

        .footer-wrap {
            border-top: 1px solid rgba(32, 50, 63, 0.12);
            background: rgba(255, 253, 248, 0.75);
        }

        .fade-up {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.7s ease forwards;
        }

        .fade-up.delay-1 {
            animation-delay: 0.12s;
        }

        .fade-up.delay-2 {
            animation-delay: 0.24s;
        }

        .fade-up.delay-3 {
            animation-delay: 0.36s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 991.98px) {
            .topbar {
                position: static;
            }

            .auth-grid {
                grid-template-columns: 1fr;
            }

            .auth-side {
                min-height: unset;
            }
        }

        @media (max-width: 767.98px) {
            .main-content {
                padding-top: 1.3rem;
            }

            .metric-value {
                font-size: 1.26rem;
            }

            .navbar .nav-link {
                margin-bottom: 0.3rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
<div class="site-shell">
    {% block navbar %}{% endblock %}

    {% if messages %}
    <div class="container pt-3">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags|default:'info' }}{% endif %} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Kapat"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
